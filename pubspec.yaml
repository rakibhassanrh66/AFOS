name: afos_v7
description: AFOS - All Facilities One System for Daffodil International University
publish_to: 'none'
version: 2.0.2+16

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.0
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  go_router: ^14.6.2
  get_it: ^8.0.2
  dio: ^5.7.0
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  onesignal_flutter: ^5.2.5
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  webview_flutter: ^4.10.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  pdf: ^3.11.1
  printing: ^5.13.2
  open_file: ^3.5.8
  path_provider: ^2.1.4
  connectivity_plus: ^6.1.1
  package_info_plus: ^9.0.1
  intl: ^0.19.0
  timeago: ^3.7.0
  rxdart: ^0.28.0
  crypto: ^3.0.5
  file_picker: ^8.1.2
  json_annotation: ^4.9.0
  syncfusion_flutter_pdf: ^27.2.5
  excel: ^4.0.6
  # More tolerant .xlsx reader — the `excel` package (v4) throws
  # "Null check operator used on a null value" in its own cell parser on some
  # Google-Sheets exports; spreadsheet_decoder is the fallback that reads them.
  spreadsheet_decoder: ^2.3.0
  # Opt into 90Hz/120Hz on Android (Flutter defaults to 60Hz otherwise).
  flutter_displaymode: ^0.6.0
  geolocator: ^13.0.2
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.1
  app_badge_plus: ^1.1.3
  flutter_background_service: ^5.1.0
  record: ^6.2.1
  audioplayers: ^6.7.1
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon_source.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/app_icon_source.png"
    background_color: "#060D1F"
    theme_color: "#060D1F"
  windows:
    generate: true
    image_path: "assets/images/app_icon_source.png"
  macos:
    generate: true
    image_path: "assets/images/app_icon_source.png"

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/
