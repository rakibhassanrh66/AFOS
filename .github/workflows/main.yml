name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    # Release tags drive the `release` job below. Branch pushes still run
    # analyze/build_ios exactly as before; only a v* tag publishes anything.
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
      - run: flutter pub get
      # --no-fatal-infos: this codebase carries a known, accepted baseline
      # of ~330 info-level lints (deprecated withOpacity, prefer_const,
      # curly-braces style, etc.) with zero warnings/errors — flutter
      # analyze treats info-level issues as fatal by default, which made
      # this step fail on every push/PR regardless of real correctness.
      - run: flutter analyze --no-fatal-infos

  # No Mac in this project's dev environment (Windows), so this is the only
  # way to know an iOS-breaking change shipped -- macos-latest runners
  # ship Xcode, so this actually compiles the app for iOS (catching missing
  # platform implementations, iOS-specific API breakage, plugin
  # incompatibilities) on every push/PR. --no-codesign skips certificate/
  # provisioning-profile signing entirely, since that needs a paid Apple
  # Developer account this project doesn't have -- it can't produce an
  # installable .ipa, only prove the app still builds for iOS.
  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign

  # Publishes the Android APK to a GitHub Release. Until this existed, every
  # release was manual and therefore kept being forgotten -- 2.2.0 through
  # 2.3.1 all shipped to Vercel with no GitHub Release and no APK anywhere but
  # the maintainer's disk. Runs ONLY on a v* tag, so ordinary pushes to main
  # stay as cheap as they were.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create the release and upload the asset
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
      - run: flutter pub get

      # `flutter clean` is deliberate, not cargo-culting: building a debug APK
      # before a release one regenerates GeneratedPluginRegistrant.java with
      # the debug-only integration_test plugin, and the release compile then
      # fails with "package dev.flutter.plugins.integration_test does not
      # exist". A clean runner shouldn't hit it, but this job must never be
      # the thing that silently ships a stale artifact.
      - run: flutter clean
      - run: flutter pub get
      - run: flutter build apk --release

      # Name the artifact after the tag so downloads are self-identifying
      # rather than a pile of interchangeable app-release.apk files.
      - name: Name the APK after the tag
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/AFOS-${GITHUB_REF_NAME}.apk"

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
