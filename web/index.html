<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AFOS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Was the raw project name ("afos_v7") -- showed as the tab title for
       the moment before Flutter boots and JS takes over, then visibly
       flashed/changed to "AFOS" once it did. Matching it here removes the
       flash; AfosAppBar (web_title.dart) takes over with the actual
       per-screen title once the app is running. -->
  <title>AFOS</title>
  <link rel="manifest" href="manifest.json">

  <!-- Passkeys Web SDK -- supabase_flutter transitively depends on the
       passkeys plugin (WebAuthn support), which AFOS never actually uses.
       Its web implementation still unconditionally registers itself during
       Flutter's engine bootstrap (before main() runs), and without this
       script it throws a null-check TypeError that aborts plugin
       registration entirely -- silently preventing runApp() from ever
       being called (permanent blank page, confirmed via a symbolicated
       stack trace: PasskeysWeb.registerWith in web_plugin_registrant.dart). -->
  <script src="https://github.com/corbado/flutter-passkeys/releases/download/2.4.0/bundle.js"></script>

  <!-- OneSignal Web Push -- the onesignal_flutter Dart plugin has no web
       platform implementation at all, so web push is wired directly against
       OneSignal's own Web SDK here instead. Bridged into Dart via
       lib/core/services/onesignal_web_bridge_web.dart, which calls the
       three afosOneSignal* functions below through dart:js_interop. -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function (OneSignal) {
      await OneSignal.init({ appId: "2ae8d7b3-8999-4054-b185-2256b290993c" });
    });

    // OneSignal's own SDK throws internally from login()/logout()/
    // requestPermission() while "Web Push" isn't yet enabled in the
    // OneSignal dashboard (confirmed live: it fails reading an internal
    // property on its own not-yet-configured state) -- caught here so a
    // third-party SDK's internal failure never surfaces as an uncaught
    // exception in this app, regardless of dashboard configuration state.
    window.afosOneSignalLogin = function (externalId) {
      window.OneSignalDeferred.push(function (OneSignal) {
        try { Promise.resolve(OneSignal.login(externalId)).catch(function () {}); } catch (e) {}
      });
    };
    window.afosOneSignalLogout = function () {
      window.OneSignalDeferred.push(function (OneSignal) {
        try { Promise.resolve(OneSignal.logout()).catch(function () {}); } catch (e) {}
      });
    };
    window.afosOneSignalRequestPermission = function () {
      window.OneSignalDeferred.push(function (OneSignal) {
        try { Promise.resolve(OneSignal.Notifications.requestPermission()).catch(function () {}); } catch (e) {}
      });
    };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
