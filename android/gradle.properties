org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Recent Kotlin Gradle Plugin versions hit a Windows-specific
# "Could not close incremental caches" failure in their out-of-process
# Build Tools API compiler. Disabling incremental compilation avoids the
# buggy cache-close path entirely (slightly slower builds, but reliable).
kotlin.incremental=false
